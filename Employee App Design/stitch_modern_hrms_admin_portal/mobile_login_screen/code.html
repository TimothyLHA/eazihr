<!DOCTYPE html><html class="light" lang="en"><head>

                    "on-primary-container": "#7c839b",
                    "on-error-container": "#93000a",
                    "tertiary-fixed-dim": "#ffb95f",
                    "on-primary": "#ffffff",
                    "surface-container-low": "#eff4ff",
                    "primary-container": "#131b2e",
                    "on-surface-variant": "#45464d",
                    "surface-container": "#e5eeff",
                    "on-surface": "#0b1c30",
                    "secondary-fixed-dim": "#4edea3",
                    "on-primary-fixed": "#131b2e",
                    "on-secondary-container": "#00714d",
                    "on-tertiary-fixed": "#2a1700",
                    "secondary-container": "#6cf8bb",

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        display: inline-block;
        line-height: 1;
        text-transform: none;
        letter-spacing: normal;
        word-wrap: normal;
        white-space: nowrap;
        direction: ltr;
      }
      
      .glass-card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      .ambient-glow {
        position: fixed;
        top: -10%;
        right: -10%;
        width: 60%;
        height: 60%;
        background: radial-gradient(circle, rgba(211, 228, 254, 0.4) 0%, rgba(248, 249, 255, 0) 70%);
        z-index: -1;
        pointer-events: none;
      }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md text-body-md min-h-screen flex flex-col items-center overflow-hidden">
<!-- Subtle Ambient Background -->
<div class="ambient-glow"></div>
<div class="fixed bottom-[-20%] left-[-10%] w-[70%] h-[70%] bg-radial-gradient from-surface-container-high/20 to-transparent rounded-full blur-3xl z-[-1]"></div>
<!-- Main Container (Mobile Focused) -->
<main class="w-full max-w-md h-screen flex flex-col px-margin-page relative">
<!-- Header Section -->
<header class="pt-16 pb-12 flex flex-col items-center text-center">
<div class="mb-6 w-16 h-16 bg-primary-container rounded-2xl flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-on-primary text-[32px]" data-icon="shield">shield</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">
                Enterprise HRMS
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2 max-w-[280px]">
                Executive Workspace Secure Authentication
            </p>
</header>
<!-- Form Section -->
<section class="flex-grow flex flex-col">
<form class="space-y-6" id="loginForm">
<!-- Employee ID Input -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest px-1">
                        Employee ID / Email
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="person">person</span>
<input class="w-full h-14 pl-12 pr-4 bg-white border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all duration-200 outline-none" placeholder="e.g. EMP-99283" type="text">
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest px-1">
                        Password
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full h-14 pl-12 pr-12 bg-white border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all duration-200 outline-none" placeholder="••••••••" type="password">
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end">
<a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">
                        Forgot Password?
                    </a>
</div>
<!-- Login Button -->
<div class="pt-4">
<button class="w-full h-14 bg-primary text-on-primary font-title-md text-title-md rounded-xl shadow-lg shadow-primary/10 hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-3" type="submit">
                        Log In
                        <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Biometric Option -->
<div class="mt-8 flex flex-col items-center gap-4">
<div class="flex items-center w-full gap-4">
<div class="h-[1px] flex-grow bg-outline-variant"></div>
<span class="font-label-md text-label-md text-outline uppercase tracking-tighter">or sign in with</span>
<div class="h-[1px] flex-grow bg-outline-variant"></div>
</div>
<button aria-label="Biometric Login" class="w-20 h-20 rounded-full border border-outline-variant flex items-center justify-center hover:bg-surface-container transition-all active:scale-90">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="fingerprint">fingerprint</span>
</button>
<span class="font-label-md text-label-md text-on-surface-variant">Biometric Sign-in</span>
</div>
</section>
<!-- Footer Links -->
<footer class="py-8 mt-auto flex flex-col items-center gap-4">
<div class="flex gap-8">
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors flex items-center gap-1" href="#">
<span class="material-symbols-outlined text-[16px]" data-icon="help_outline">help_outline</span>
                    Support
                </a>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors flex items-center gap-1" href="#">
<span class="material-symbols-outlined text-[16px]" data-icon="info">info</span>
                    Privacy Policy
                </a>
</div>
<p class="font-caption text-caption text-outline/60">
                © 2024 Enterprise Systems. v2.4.0-LP
            </p>
</footer>
</main>
<script>
        // Micro-interaction for form submission feedback
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span class="font-title-md text-title-md">Authenticating...</span>
            `;

            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.disabled = false;
                // Add a simple subtle error vibration if empty
                btn.classList.add('animate-shake');
                setTimeout(() => btn.classList.remove('animate-shake'), 400);
            }, 1500);
        });

        // Toggle Password Visibility
        const togglePass = document.querySelector('button[type="button"]');
        const passInput = document.querySelector('input[type="password"]');
        togglePass.addEventListener('click', () => {
            const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passInput.setAttribute('type', type);
            togglePass.querySelector('span').textContent = type === 'password' ? 'visibility' : 'visibility_off';
        });
    </script>
<style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake {
            animation: shake 0.2s ease-in-out 0s 2;
        }
    </style>
</body></html>
