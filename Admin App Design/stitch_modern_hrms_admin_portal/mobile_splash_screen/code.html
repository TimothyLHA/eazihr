<style>
        body {
            background-color: #f8f9ff;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }

        .logo-reveal {
            animation: logo-reveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes logo-reveal {
            0% { opacity: 0; transform: translateY(20px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .progress-bar-container {
            width: 240px;
            height: 2px;
            background: #e2e8f0;
            overflow: hidden;
            border-radius: 999px;
        }

        .progress-bar-fill {
            height: 100%;
            background: #000000;
            width: 0%;
            animation: progress-fill 3.5s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }

        @keyframes progress-fill {
            0% { width: 0%; }
            20% { width: 30%; }
            50% { width: 45%; }
            75% { width: 85%; }
            100% { width: 100%; }
        }

        .text-fade {
            animation: text-pulse 2s infinite ease-in-out;
        }

        @keyframes text-pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .subtle-grid {
            background-image: radial-gradient(#000000 0.5px, transparent 0.5px);
            background-size: 32px 32px;
            opacity: 0.03;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface">
<div class="relative flex flex-col items-center justify-center min-h-screen px-margin-page">
<!-- Atmospheric Background Element -->
<div class="absolute inset-0 subtle-grid pointer-events-none"></div>
<!-- Decorative Ambient Light -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/5 blur-[120px] rounded-full pointer-events-none"></div>
<!-- Brand Canvas -->

<!-- Shield Logo Icon -->
<div class="mb-6 flex items-center justify-center w-20 h-20 rounded-2xl bg-primary text-on-primary shadow-xl shadow-primary/10">
<span class="material-symbols-outlined !text-[44px]" style="font-variation-settings: 'FILL' 1;">
                    shield_person
                </span>
</div>
<!-- Brand Identity -->
<h1 class="font-display-lg text-headline-lg-mobile md:text-display-lg text-primary tracking-tight mb-2">
                ExecutiveHR
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant/80 tracking-wide">
                Enterprise Human Capital Management
            </p>
</div>
<!-- Loading Module -->
<div class="absolute bottom-20 flex flex-col items-center w-full z-10 px-margin-page">
<div class="progress-bar-container mb-4">
<div class="progress-bar-fill"></div>
</div>
<div class="flex items-center space-x-2">
<span class="material-symbols-outlined text-on-surface-variant text-[16px] animate-spin">
                    sync
                </span>
<p class="font-label-md text-label-md text-on-surface-variant text-fade uppercase tracking-[0.1em]">
                    Connecting to secure servers...
                </p>
</div>
</div>
<!-- Security Footer Badge -->
<div class="absolute bottom-8 flex items-center gap-1 opacity-40">
<span class="material-symbols-outlined text-[14px]">verified_user</span>
<span class="font-caption text-caption">256-bit AES Encryption Active</span>
</div>
</div>
<!-- Micro-interaction Script -->
<script>
        // Simple redirection simulation after loading completes
        document.addEventListener('DOMContentLoaded', () => {
            const progressBar = document.querySelector('.progress-bar-fill');
            
            progressBar.addEventListener('animationend', () => {
                // In a real app, this would trigger the route transition to the dashboard
                console.log('Handshake complete. Transitioning to dashboard...');
                
                // Visual feedback for completion
                setTimeout(() => {
                    const statusText = document.querySelector('.font-label-md');
                    statusText.textContent = 'Authenticated. Entering Portal...';
                    statusText.classList.remove('text-fade');
                    statusText.classList.add('text-secondary');
                    
                    document.querySelector('.progress-bar-fill').classList.add('bg-secondary');
                }, 200);
            });
        });
    </script>
